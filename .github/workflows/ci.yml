name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Coverage report (informational)
        run: npx vitest run --coverage
        continue-on-error: true
