# Smithery registry config — https://smithery.ai/docs/build/project-config/smithery-yaml
# This is an HTTP-transport MCP server; Smithery hosts the listing and proxies
# clients straight to our Cloudflare Workers endpoint.

name: wikipedia-recent-changes-mcp
displayName: Wikipedia Recent Changes + Wikidata
description: |
  Live Wikipedia edit-feed for AI agents — every breaking news event lands here within minutes. Plus page summaries, trending, Wikidata entity lookup.
homepage: https://wikipedia-recent-changes-mcp.atlasword.workers.dev
repository: https://github.com/guptaprakhariitr/wikipedia-recent-changes-mcp
license: MIT
version: "0.1.0"

runtime: container

startCommand:
  type: http
  url: https://wikipedia-recent-changes-mcp.atlasword.workers.dev/mcp
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: API key (optional)
        description: |
          Bearer token from https://wikipedia-recent-changes-mcp.atlasword.workers.dev/upgrade.
          Leave blank for the anonymous free tier (~100 calls/month/IP).
    required: []
  exampleConfig:
    apiKey: ""
  commandFunction: |-
    (config) => ({
      type: "http",
      url: "https://wikipedia-recent-changes-mcp.atlasword.workers.dev/mcp",
      headers: config.apiKey ? { Authorization: `Bearer ${config.apiKey}` } : {}
    })

remote:
  type: http
  url: https://wikipedia-recent-changes-mcp.atlasword.workers.dev/mcp

categories:
  - news
  - research
  - knowledge-graph
tags:
  - wikipedia
  - wikidata
  - knowledge-graph
  - trending
  - news-monitoring

tools:
  - name: wiki_recent_changes
  - name: wiki_page_summary
  - name: wiki_trending
  - name: wikidata_search

auth:
  type: bearer
  required: false
  description: |
    Optional. Anonymous free tier works for ~100 calls/month per IP. For higher
    quotas, grab a key from https://wikipedia-recent-changes-mcp.atlasword.workers.dev/upgrade and pass
    it as `Authorization: Bearer <key>`.
